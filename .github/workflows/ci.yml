name: 自动编译打包Debug包

on:
    push:
        branches:
            - wd
        paths-ignore:
            - '**.md'
            - '**.txt'
            - '.github/**'
            - '!.github/workflows/**'
            - '!.github/scripts/**'
            - "TMessagesProj/src/main/res/values**/**"
            - '.gitignore'
    workflow_dispatch:

jobs:
    build:
        name: Gradle Build
        if: ${{ github.event_name != 'pull_request' && success() && github.ref == 'refs/heads/wd' }}
        runs-on: ubuntu-latest
        env:
            CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
            CCACHE_NOHASHDIR: "true"
            CCACHE_MAXSIZE: "10G"
            CCACHE_HARDLINK: "true"
        steps:
            - uses: actions/checkout@v3
              with:
                  fetch-depth: 0
                  path: .
            - name: Check out submodules
              run: |
                git -c submodule."libs/rust".update=none submodule update --init --recursive

            - name: Cache Gradle packages
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                      .gradle
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Cache Android SDK
              uses: actions/cache@v4
              with:
                  path: |
                      ${{ env.ANDROID_HOME }}/build-tools
                      ${{ env.ANDROID_HOME }}/platforms
                      ${{ env.ANDROID_HOME }}/ndk
                  key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/build.gradle*') }}
                  restore-keys: |
                      ${{ runner.os }}-android-sdk-

            - name: Cache Android NDK
              uses: actions/cache@v4
              with:
                  path: |
                      ${{ env.ANDROID_HOME }}/ndk/28.1.13356709
                  key: ${{ runner.os }}-android-ndk-28.1.13356709

            - name: Get short SHA
              run: |
                  echo "SHA7=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'
                  cache: 'gradle'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-read-only: true

            - name: Set up ccache
              uses: hendrikmuhs/ccache-action@v1
              with:
                  path: ~/.ccache
                  key: ccache-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.c') }}
                  restore-keys: |
                      ccache-${{ runner.os }}-
                      ccache-

            - name: Setup Android SDK Tools
              uses: android-actions/setup-android@v3
              with:
                  api-level: 36
                  build-tools: 36.0.2
                  ndk: 28.1.13356709
                  cache: true

            - name: Prepare Environment
              run: |
                  echo "Removing large packages"
                  sudo apt-get remove -y '^dotnet-.*' aspnetcore-targeting-pack-6.0
                  sudo apt-get remove -y '^llvm-.*'
                  sudo apt-get remove -y 'php.*'
                  sudo apt-get remove -y '^mongodb-.*'
                  sudo apt-get remove -y '^mysql-.*'
                  sudo apt-get remove -y azure-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri
                  sudo apt-get autoremove -y
                  sudo apt-get clean
                  echo "Removing large directories"
                  sudo rm -rf /usr/share/dotnet/
                  sudo rm -rf /usr/local/graalvm/
                  sudo rm -rf /usr/local/.ghcup/
                  sudo rm -rf /usr/local/share/powershell
                  sudo rm -rf /usr/local/share/chromium
                  sudo rm -rf /usr/local/lib/node_modules
                  df -h
                  sudo apt-get install bison gcc make curl ninja-build -y
                  echo "sdk.dir=${ANDROID_HOME}" >> local.properties

            - name: Artifact Build
              run: |
                  ccache -s
                  ./gradlew TMessagesProj:assembleDebug
                  ccache -s
                  echo "APK_FILE=$(find TMessagesProj/build/outputs/apk -name '*arm64*.apk')" >> $GITHUB_ENV

            - uses: actions/upload-artifact@v4
              name: Upload apk (arm64-v8a)
              with:
                  name: Nnngram-arm64-v8a-${{ env.SHA7 }}
                  path: ${{ env.APK_FILE }}

    upload:
        name: Upload Release
        if: ${{ github.event_name != 'pull_request' && success() && github.ref == 'refs/heads/wd' }}
        runs-on: ubuntu-latest
        needs:
            - build
            - telegram-bot-api
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Restore last-sent SHA
              id: restore_last_sent
              uses: actions/cache/restore@v4
              with:
                  path: .ci-last-sent-sha
                  key: ci-last-sent-${{ github.ref_name }}-placeholder
                  restore-keys: |
                      ci-last-sent-${{ github.ref_name }}-
            - name: Read last-sent SHA
              id: last_sent
              run: |
                  if [ -f .ci-last-sent-sha ]; then
                    sha=$(tr -d '[:space:]' < .ci-last-sent-sha)
                    echo "sha=$sha" >> "$GITHUB_OUTPUT"
                    echo "last sent: $sha"
                  else
                    echo "sha=" >> "$GITHUB_OUTPUT"
                    echo "no cached last-sent sha (first run or evicted)"
                  fi
            - name: Download Artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
            - name: Download Telegram Bot API Binary
              uses: actions/download-artifact@v4
              with:
                  name: telegram-bot-api-binary
                  path: .

            - name: Find apk
              run: |
                  mkdir apks
                  find artifacts -name "*.apk" -exec cp {} apks \;
                  echo "APK_FILE_UPLOAD=$(find apks -name '*arm64*.apk')" >> $GITHUB_ENV
            - name: Get Apk Info
              id: apk
              uses: JantHsueh/get-apk-info-action@master
              with:
                  apkPath: ${{ env.APK_FILE_UPLOAD }}

            - name: Release
              run: |
                  chmod +x telegram-bot-api-binary
                  ./telegram-bot-api-binary --api-id=21724 --api-hash=3e0cb5efcd52300aec5994fdfc5bdc16 --local 2>&1 > /dev/null &
                  pip install --quiet requests
                  python3 .github/scripts/upload_ci.py
              env:
                  CHAT_ID: ${{ secrets.TELEGRAM_CHATID }}
                  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
                  VERSION_CODE: ${{ steps.apk.outputs.versionCode }}
                  VERSION_NAME: ${{ steps.apk.outputs.versionNum }}
                  LAST_SENT_SHA: ${{ steps.last_sent.outputs.sha }}
                  HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
                  COMMITS_JSON: ${{ toJSON(github.event.commits) }}
                  REPO_URL: ${{ github.server_url }}/${{ github.repository }}

            - name: Record successful upload SHA
              if: success()
              run: echo "${{ github.sha }}" > .ci-last-sent-sha
            - name: Save last-sent SHA
              if: success()
              uses: actions/cache/save@v4
              with:
                  path: .ci-last-sent-sha
                  key: ci-last-sent-${{ github.ref_name }}-${{ github.run_id }}
